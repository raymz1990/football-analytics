# ─── Player Props Leagues ─────────────────────────────────────────────────────
player_props_leagues:
  - "Premier League"
  - "La Liga"
  - "Serie A"
  - "Brasileirão Série A"

player_props_markets:
  - shots_total
  - shots_on_target
  - tackles
  - fouls_committed

# ─── Value Betting Thresholds ─────────────────────────────────────────────────
value_betting:
  min_ev_pct: 8.0          # EV mínimo %
  min_probability: 0.62    # Prob. mínima estimada
  min_odds: 1.65           # Odd mínima
  min_model_convergence: 3 # Mínimo de modelos concordando

  tiers:
    elite:
      ev_min: 15.0
      prob_min: 0.70
      convergence_min: 5
      emoji: "🔥"
      label: "Elite"
    strong:
      ev_min: 10.0
      prob_min: 0.65
      convergence_min: 4
      emoji: "⚡"
      label: "Forte"
    moderate:
      ev_min: 8.0
      prob_min: 0.62
      convergence_min: 3
      emoji: "🟡"
      label: "Moderada"

# ─── Models ──────────────────────────────────────────────────────────────────
models:
  monte_carlo_simulations: 10000
  elo_k_factor: 32
  elo_initial_rating: 1500
  glicko_initial_rating: 1500
  glicko_initial_rd: 350
  lookback_matches: 15
  min_matches_for_model: 5

# ─── Markets ─────────────────────────────────────────────────────────────────
markets:
  - result_1x2
  - btts
  - over_under_05
  - over_under_15
  - over_under_25
  - over_under_35
  - ht_goals
  - cards_total
  - asian_handicap
  - corners_total

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_historical: "data/historical"
  dashboard_output: "docs"
  models_cache: "data/models_cache"

# ─── Dashboard ───────────────────────────────────────────────────────────────
dashboard:
  title: "BetAnalytics Pro"
  timezone: "America/Sao_Paulo"
  max_bets_displayed: 50
  hot_bets_limit: 10
