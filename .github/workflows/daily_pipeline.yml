name: BetAnalytics Pro — Daily Pipeline

on:
  schedule:
    # Roda todo dia às 09:00 BRT (12:00 UTC) — após odds de abertura Bet365
    - cron: '0 12 * * *'
    # Segunda rodada às 14:00 BRT (17:00 UTC) — atualização mid-day
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      skip_collect:
        description: 'Skip data collection (use cache)'
        required: false
        default: 'false'
      only_dashboard:
        description: 'Only rebuild dashboard'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore historical data cache
        uses: actions/cache@v4
        with:
          path: |
            data/historical
            data/models_cache
          key: betanalytics-historical-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            betanalytics-historical-${{ runner.os }}-

      - name: Create .env from secrets
        run: |
          echo "FOOTBALL_DATA_API_KEY=${{ secrets.FOOTBALL_DATA_API_KEY }}" >> .env
          echo "API_FOOTBALL_KEY=${{ secrets.API_FOOTBALL_KEY }}" >> .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env
          echo "OPENWEATHER_KEY=${{ secrets.OPENWEATHER_KEY }}" >> .env

      - name: Run BetAnalytics pipeline
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.skip_collect }}" = "true" ]; then
            ARGS="$ARGS --skip-collect"
          fi
          if [ "${{ github.event.inputs.only_dashboard }}" = "true" ]; then
            ARGS="$ARGS --only-dashboard"
          fi
          python main.py $ARGS

      - name: Commit historical data updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BetAnalytics Bot"
          git add data/historical/ data/models_cache/ docs/ || true
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
