name: BetAnalytics Pro — Daily Pipeline

on:
  schedule:
    # Roda às 10:00 BRT (13:00 UTC) — odds da Bet365 já abertas para jogos do dia
    - cron: '0 13 * * *'
    # Segunda rodada às 16:00 BRT (19:00 UTC) — atualização antes dos jogos noturnos
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      skip_collect:
        description: 'Skip data collection'
        required: false
        default: 'false'
      only_dashboard:
        description: 'Only rebuild dashboard'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore historical data cache
        uses: actions/cache@v4
        with:
          path: |
            data/historical
            data/models_cache
          key: betanalytics-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            betanalytics-${{ runner.os }}-

      - name: Run BetAnalytics pipeline
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.skip_collect }}" = "true" ] && ARGS="$ARGS --skip-collect"
          [ "${{ github.event.inputs.only_dashboard }}" = "true" ] && ARGS="$ARGS --only-dashboard"
          echo "=== Running pipeline ==="
          python main.py $ARGS
          echo "=== Pipeline complete ==="
          echo "=== docs/ ==="
          ls -lh docs/
          echo "=== data.json summary ==="
          python -c "
          import json
          d = json.load(open('docs/data.json'))
          m = d.get('minor', {})
          print(f'Fixtures:       {d.get(\"total_fixtures\", 0)}')
          print(f'Value Bets:     {d.get(\"total_value_bets\", 0)}')
          print(f'Date:           {d.get(\"date\")}')
          print(f'Minor Fixtures: {m.get(\"minor_fixtures\", 0)}')
          print(f'Minor VBets:    {len(m.get(\"minor_value_bets\", []))}')
          odds_d = json.load(open('docs/data.json'))
          print(f'Has odds:       {odds_d.get(\"total_fixtures\",0) > 0}')
          "

      - name: Commit and push updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BetAnalytics Bot"
          git add docs/ data/historical/ data/models_cache/ || true
          git diff --staged --quiet || git commit -m "chore: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
